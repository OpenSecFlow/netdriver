api:
  # HTTP request log level
  # - INFO: only output request method and path;
  # - DEBUG: output detailed request body; 
  request_log_level: DEBUG
logging:
  # INFO / DEBUG / TRACE
  level: INFO
  # Log file path for agent
  log_file: logs/agent.log
  intercept_loggers:
    - uvicorn.access
    - uvicorn.error
session:
  # Session pool check interval, pool status will be output in the log
  check_interval: 30
  # Read buffer size (unit: bytes), 1MB, default is 8192
  read_buffer_size: 1048576
  # profiles for session smart adaptiv read
  ssh:
    login_timeout: 20
    connect_timeout: 30
    # Send keepalive every 60 seconds
    keepalive_interval: 60
    # Send up to 3 times after no response
    keepalive_count_max: 3
    # https://asyncssh.readthedocs.io/en/latest/api.html#supported-algorithms
    # enabled all algorithms by default, add extra algorithms if needed
    kex_algs: []
    # https://asyncssh.readthedocs.io/en/latest/api.html#supported-algorithms
    # enabled all algorithms by default, add extra algorithms if needed
    encryption_algs: []
    # Set terminal size, optional item
    term_size:
      width: 1000
      height: 100
  profiles:
    # global profile, used when no other profile matche
    global:
      read_timeout: 10.0
      # Close the sessions created before the expiration time. Format: HH:MM
      expiration_time: "16:00"
      # If the idle time exceeds the maximum, close the session. Unit: Seconds
      max_idle_time: 600.0
      # https://asyncssh.readthedocs.io/en/stable/api.html#publickeyalgs
      # A list of server host key algorithms to allow during the SSH handshake
      server_host_key_algs: []
    # profile based on vendor/type/version, priority is higher than default
    vendor:
      cisco:
        nexus:
          base:
            read_timeout: 60.0
            expiration_time: "16:00"
            max_idle_time: 600.0
            server_host_key_algs: []
    #       9.8:
    #         read_timeout: 12.0
    #         expiration_time: "16:00"
    #         max_idle_time: 600.0
    #         server_host_key_algs: []
    # profile based on IP address, priority is higher than vendor/type/version
    # ip:
    #   192.168.60.198:
    #     read_timeout: 15.0
    #     expiration_time: "16:00"
    #     max_idle_time: 600.0
    #     server_host_key_algs: []

# Auto-discovery configuration
discovery:
  # Nmap binary path
  nmap_path: nmap
  # Vendor OID mapping file
  vendor_map_file: config/agent/vendor_oid_map.yml
  # SQLite database path for task persistence
  db_path: data/discovery.db
  # Maximum concurrent probes per task
  max_concurrent_probes: 50
  # Per-probe timeout (seconds)
  probe_timeout: 30.0
  ssh:
    connect_timeout: 15.0
    read_timeout: 5.0
  snmp:
    timeout: 5.0
    retries: 1
  task:
    # Maximum concurrent discovery tasks
    max_tasks: 5
    # Result retention time (seconds), default 24 hours
    result_retention: 86400
